name: Update TCIA metadata snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7,19 * * *"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: tcia-metadata-snapshot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build snapshot
        run: |
          mkdir -p dist
          python scripts/tcia_snapshot.py build \
            --out dist/tcia_snapshot.sqlite \
            --gzip-out dist/tcia_snapshot.sqlite.gz \
            --manifest-out dist/tcia_snapshot_manifest.json \
            --exports-dir dist

      - name: Validate snapshot artifacts
        run: |
          python scripts/tcia_snapshot.py validate \
            --db dist/tcia_snapshot.sqlite \
            --exports-dir dist

      - name: Compare with published snapshot
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="tcia-snapshot-latest"
          new_fingerprint="$(python -c 'import json; print(json.load(open("dist/tcia_snapshot_manifest.json"))["release_fingerprint"])')"
          echo "new_fingerprint=${new_fingerprint}" >> "$GITHUB_OUTPUT"

          mkdir -p previous
          if gh release download "$tag" --pattern tcia_snapshot_manifest.json --dir previous >/dev/null 2>&1; then
            old_fingerprint="$(python -c 'import json; m=json.load(open("previous/tcia_snapshot_manifest.json")); print(m.get("release_fingerprint") or (str(m.get("schema_version", "")) + ":" + m.get("content_sha256", "")))')"
          else
            old_fingerprint=""
          fi

          echo "old_fingerprint=${old_fingerprint}" >> "$GITHUB_OUTPUT"
          if [ "$new_fingerprint" = "$old_fingerprint" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish changed snapshot
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="tcia-snapshot-latest"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "Latest TCIA metadata snapshot" \
              --notes "Automatically updated SQLite metadata snapshot for the TCIA query skill."
          fi
          gh release upload "$tag" \
            dist/tcia_snapshot.sqlite.gz \
            dist/tcia_snapshot_manifest.json \
            dist/agent_datasets.jsonl.gz \
            dist/agent_current_downloads.jsonl.gz \
            --clobber

          for asset in controlled_access_datasets.json dicom_annotation_index.json; do
            gh release delete-asset "$tag" "$asset" --yes >/dev/null 2>&1 || true
          done

      - name: Report unchanged snapshot
        if: steps.compare.outputs.changed == 'false'
        run: echo "Snapshot release fingerprint is unchanged; release assets were not updated."
